  <!-- Tagline -->
  <text x="340" y="296" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="12" font-weight="400" letter-spacing="4" fill="#00B4D8" opacity="0.8" style="fill:rgb(0, 180, 216);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:Poppins, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">YOUR JOURNEY AWAITS</text>

